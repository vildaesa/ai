<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Chat</title>

  <!-- Ionic Core 8 -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core@8/dist/ionic/ionic.esm.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core@8/css/ionic.bundle.css" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Marked.js & DOMPurify untuk rendering markdown yang aman -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Link ke CSS Eksternal -->
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>

  <ion-app>
    <ion-header>
      <ion-toolbar>
        <ion-buttons slot="start">
          <ion-button fill="clear" color="dark" id="profile-button">
            <i data-lucide="user-round"></i>
          </ion-button>
        </ion-buttons>
        <ion-title>AI Assistant</ion-title>
        <ion-buttons slot="end">
          <ion-button fill="clear" color="dark" id="menu-button">
            <i data-lucide="sliders-horizontal"></i>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages">

          <div class="message-row ai-row">
            <div class="avatar avatar-ai">AI</div>
            <div class="message-content-wrapper">
              <div class="message-header">
                <span class="sender-name">Asisten AI</span>
              </div>
              <div class="message-body">
                👋 Halo! Saya asisten AI. Kirim pesan apa saja. Anda bisa meminta saya membuat kode program, merancang antarmuka UI, menjelaskan konsep, atau mengobrol santai.
              </div>
            </div>
          </div>

        </div>

        <div class="chat-input">
          <ion-input id="messageInput" placeholder="Tanya sesuatu kepada AI..." clear-input></ion-input>
          <ion-button fill="solid" color="primary" id="sendButton">
            <i data-lucide="send"></i>
          </ion-button>
        </div>
      </div>
    </ion-content>

    <ion-toast id="infoToast" message="" duration="2000" position="bottom" color="dark"></ion-toast>
  </ion-app>

  <!-- Link ke JS Eksternal -->
  <script src="./assets/js/app.js" defer></script>
</body>
</html>
